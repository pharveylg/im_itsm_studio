<svg xmlns="http://www.w3.org/2000/svg" width="920" height="560" viewBox="0 0 920 560" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#444"/>
    </marker>
    <marker id="darrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="880" height="520" fill="#f8fafc" stroke="#cbd5e1" rx="10"/>
  <text x="460" y="48" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">OAS Framework — Relationship Architecture</text>

  <!-- External context -->
  <rect x="40" y="70" width="200" height="46" fill="#ecfdf5" stroke="#10b981" rx="6"/>
  <text x="140" y="98" text-anchor="middle" font-size="13" fill="#065f46">ITIL 4 Practices</text>
  <rect x="40" y="130" width="200" height="46" fill="#ecfdf5" stroke="#10b981" rx="6"/>
  <text x="140" y="158" text-anchor="middle" font-size="13" fill="#065f46">ServiceNow (reference)</text>
  <line x1="140" y1="176" x2="300" y2="250" stroke="#10b981" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- OAS Framework -->
  <rect x="300" y="200" width="320" height="60" fill="#dbeafe" stroke="#2563eb" rx="8"/>
  <text x="460" y="235" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e3a8a">OAS Framework</text>

  <!-- Governance column -->
  <text x="300" y="300" font-size="12" font-weight="bold" fill="#334155">Governance</text>
  <rect x="300" y="310" width="150" height="34" fill="#fff" stroke="#2563eb" rx="5"/>
  <text x="375" y="332" text-anchor="middle" font-size="12" fill="#1e3a8a">OAS-000</text>
  <rect x="300" y="352" width="150" height="34" fill="#fff" stroke="#2563eb" rx="5"/>
  <text x="375" y="374" text-anchor="middle" font-size="12" fill="#1e3a8a">OAS-501</text>

  <!-- Methodologies column -->
  <text x="470" y="300" font-size="12" font-weight="bold" fill="#334155">Methodologies</text>
  <rect x="470" y="310" width="150" height="30" fill="#fff" stroke="#2563eb" rx="5"/>
  <text x="545" y="330" text-anchor="middle" font-size="11" fill="#1e3a8a">OAS-101</text>
  <rect x="470" y="344" width="150" height="30" fill="#fff" stroke="#2563eb" rx="5"/>
  <text x="545" y="364" text-anchor="middle" font-size="11" fill="#1e3a8a">OAS-201</text>
  <rect x="470" y="378" width="150" height="30" fill="#fff" stroke="#2563eb" rx="5"/>
  <text x="545" y="398" text-anchor="middle" font-size="11" fill="#1e3a8a">OAS-301</text>
  <rect x="470" y="412" width="150" height="30" fill="#fff" stroke="#2563eb" rx="5"/>
  <text x="545" y="432" text-anchor="middle" font-size="11" fill="#1e3a8a">OAS-401</text>

  <!-- Knowledge Base column -->
  <text x="660" y="300" font-size="12" font-weight="bold" fill="#334155">Knowledge Base</text>
  <rect x="660" y="310" width="170" height="30" fill="#fff" stroke="#7c3aed" rx="5"/>
  <text x="745" y="330" text-anchor="middle" font-size="10" fill="#5b21b6">KB-001 to KB-006</text>
  <rect x="660" y="344" width="170" height="30" fill="#fff" stroke="#7c3aed" rx="5"/>
  <text x="745" y="364" text-anchor="middle" font-size="10" fill="#5b21b6">Templates to Prompts</text>

  <!-- governance arrows -->
  <line x1="375" y1="310" x2="470" y2="325" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#darrow)"/>
  <line x1="375" y1="320" x2="470" y2="359" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#darrow)"/>
  <line x1="375" y1="330" x2="470" y2="393" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#darrow)"/>
  <line x1="375" y1="340" x2="470" y2="427" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#darrow)"/>
  <line x1="375" y1="352" x2="660" y2="325" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#darrow)"/>

  <!-- derived to KB -->
  <line x1="620" y1="325" x2="660" y2="325" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="620" y1="395" x2="660" y2="345" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="700" y="510" font-size="11" fill="#64748b">Dashed blue: OAS-000 governs · Purple: Knowledge Base derived from standards</text>
</svg>
